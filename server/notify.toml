# Lark notification targets per command.
#
# ── Named chat aliases ─────────────────────────────────────────────────────
# Define all Lark group chat IDs here once, then reference them by name
# in the per-command sections below.
#
[chats]
hongming     = "oc_78f29489a577f10e36ebf989bccdcc83"   # server alerts / error monitoring
store_hours  = "oc_9fe9a845d25c1e07a58a1230cbb04b5d"   # store-hours-collect group
production_accounting_report_chat  = "oc_ff2a74b2ba7b07eee95c6138b9cfd112"   # sending production automation or cron result

# ── Per-command targets ────────────────────────────────────────────────────
# Each key is a command name (matches BaseCommand.name).
# Standard keys (used by server/notify.py for run-complete cards):
#   chat = "<alias>"        — resolved via [chats] above (preferred)
#   chat_id = "<raw_id>"   — direct open_chat_id (fallback)
#   user_id = "<open_id>"  — DM to a specific user
#
# Commands can also define extra named keys for secondary notifications
# (read via lark_client.command_chat_for(command, key)):
#   alert_chat = "<alias>" — e.g. a secondary channel for unfilled-data alerts
#
# If a command is not listed here, notifications are silently skipped.
# Set LARK_APP_ID and LARK_APP_SECRET in .env to enable Lark integration.

[daily-report]
chat = "hongming"

[ksb1]
# Run-complete card goes to admin (hongming).
# The XLSX report + @mention is sent to the production group by notify_ksb1_file().
chat = "hongming"

[treasury-loan-watch]
chat = "hongming"

[store-hours-collect]
chat            = "hongming"    # run-complete card → admin (failure only)
on_failure_only = true          # suppress run-complete card on success
summary_chat    = "store_hours" # data-fill summary (翻台率/总桌数) → store group
alert_chat      = "store_hours" # unfilled-store alert → store group
